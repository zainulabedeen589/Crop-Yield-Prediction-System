<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crop Yield Prediction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg,#1d2671,#c33764,#0f2027,#203a43);
    background-size:400% 400%;
    animation: gradientMove 15s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:1000px;
    padding:50px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    color:white;
    transition:0.4s ease;
}

.card:hover{
    transform:translateY(-8px);
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    font-size:32px;
    font-weight:700;
    background:linear-gradient(90deg,#00f2fe,#ff00cc);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header p{
    font-size:14px;
    opacity:0.8;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:25px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

label{
    font-size:13px;
    margin-bottom:6px;
    opacity:0.8;
}

input{
    padding:14px;
    border-radius:12px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.15);
    color:white;
    transition:0.3s;
}

input::placeholder{
    color:#ddd;
}

input:focus{
    background:rgba(0,242,254,0.2);
    box-shadow:0 0 12px #00f2fe;
}

button{
    grid-column:span 2;
    margin-top:30px;
    padding:15px;
    border-radius:50px;
    border:none;
    font-size:16px;
    font-weight:600;
    background:linear-gradient(90deg,#00f2fe,#ff00cc);
    color:black;
    cursor:pointer;
    transition:0.4s ease;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 30px #00f2fe;
}

.result-box{
    margin-top:35px;
    padding:20px;
    border-radius:18px;
    text-align:center;
    background:rgba(0,255,204,0.15);
    border:1px solid rgba(0,255,204,0.4);
    font-size:20px;
    font-weight:600;
    color:#00ffcc;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(15px);}
    to{opacity:1; transform:translateY(0);}
}

footer{
    margin-top:40px;
    text-align:center;
    font-size:12px;
    opacity:0.6;
}

@media(max-width:900px){
    .card{
        width:95%;
        padding:30px;
    }
    .form-grid{
        grid-template-columns:1fr;
    }
    button{
        grid-column:span 1;
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="header">
        <h1>🌾 Crop Yield Prediction</h1>
        <p>Machine Learning based Smart Agriculture System</p>
    </div>

    <form action="/predict" method="POST">
        <div class="form-grid">

            <div class="input-group">
                <label>Year</label>
                <input type="number" name="Year" placeholder="Enter Year" required>
            </div>

            <div class="input-group">
                <label>Average Rainfall (mm/year)</label>
                <input type="number" step="any" name="average_rain_fall_mm_per_year" placeholder="Rainfall" required>
            </div>

            <div class="input-group">
                <label>Pesticides (tonnes)</label>
                <input type="number" step="any" name="pesticides_tonnes" placeholder="Pesticides Used" required>
            </div>

            <div class="input-group">
                <label>Average Temperature (°C)</label>
                <input type="number" step="any" name="avg_temp" placeholder="Temperature" required>
            </div>

            <div class="input-group">
                <label>Area</label>
                <input type="text" name="Area" placeholder="Country/Region" required>
            </div>

            <div class="input-group">
                <label>Crop Item</label>
                <input type="text" name="Item" placeholder="Crop Name" required>
            </div>

            <button type="submit">🚀 Predict Yield</button>

        </div>
    </form>

    {% if prediction %}
    <div class="result-box">
        🌟 Predicted Crop Yield: {{ prediction[0][0] }}
    </div>
    {% endif %}

    <footer>
        Built with Flask & Decision Tree Regressor
    </footer>

</div>

</body>
</html>
